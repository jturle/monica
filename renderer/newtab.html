<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'"
    />
    <title>new tab</title>
    <style>
      :root {
        --bg: #0b0e14;
        --text: #c7d0df;
        --muted: #6b7689;
        --accent: #38e1c4;
        --line: #2a3445;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; height: 100vh; background: var(--bg); color: var(--text);
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        display: flex; align-items: center; justify-content: center;
        user-select: none;
      }
      main { width: min(560px, 80vw); text-align: center; }
      .mark {
        font-size: 34px; font-weight: 700; letter-spacing: 1px;
        color: var(--accent); margin-bottom: 4px;
      }
      .sub { color: var(--muted); font-size: 12px; margin-bottom: 26px; letter-spacing: 0.4px; }
      #go {
        width: 100%; height: 44px; padding: 0 16px;
        background: #0d1018; border: 1px solid var(--line); border-radius: 10px;
        color: var(--text); font-size: 15px; outline: none; text-align: center;
      }
      #go:focus { border-color: var(--accent); }
      #go::placeholder { color: var(--muted); }
      .hint { margin-top: 18px; color: var(--muted); font-size: 11px; }
      .hint code { color: var(--accent); }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">monica</div>
      <div class="sub">new pane</div>
      <input id="go" placeholder="Enter a URL or search…" autofocus spellcheck="false" />
      <div class="hint">this pane is a live <code>CDP target</code> — attach to drive it remotely</div>
    </main>
    <script>
      const go = document.getElementById("go");
      go.addEventListener("keydown", (e) => {
        if (e.key !== "Enter") return;
        let u = go.value.trim();
        if (!u) return;
        const hasScheme = /^(https?|about|chrome|file|data|view-source|blob|devtools):/i.test(u);
        if (!hasScheme) {
          const looksLikeHost = /^localhost(:\d+)?(\/|$)/i.test(u) || /^[^\s.]+\.[^\s]/.test(u);
          u = looksLikeHost ? "https://" + u : "https://www.google.com/search?q=" + encodeURIComponent(u);
        }
        location.href = u;
      });
    </script>
  </body>
</html>

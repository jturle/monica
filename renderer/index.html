<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'" />
    <link rel="stylesheet" href="styles.css" />
    <title>monica</title>
  </head>
  <body>
    <header id="topbar">
      <div class="brand">monica</div>
      <div class="tabs">
        <div class="tab active"><span id="tab-title">Tab 1</span></div>
      </div>
      <input id="omnibox" placeholder="Enter URL and press Enter…" spellcheck="false" />
      <div class="cdp" title="Chrome DevTools Protocol endpoint">CDP :9222</div>
    </header>

    <main id="stage"></main>

    <footer id="hint">
      <kbd>⌘D</kbd> split right · <kbd>⌘⇧D</kbd> split down · drag dividers to resize ·
      <kbd>⌘W</kbd> close pane · click a pane to select
    </footer>

    <script src="app.js"></script>
  </body>
</html>
